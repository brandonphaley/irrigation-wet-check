<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>SSC Wet Check · Field tool</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="theme.css" />
<style>
  html, body { margin: 0; padding: 0; background: #efeee9; min-height: 100vh; font-family: 'Space Grotesk', system-ui, sans-serif; color: #2a2826; }
  .stage {
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    padding: 40px 24px; box-sizing: border-box;
    background:
      radial-gradient(ellipse 80% 50% at 50% 0%, rgba(74, 124, 138, 0.10), transparent 70%),
      linear-gradient(180deg, #f3f1ea 0%, #e7e4dc 100%);
  }
  .stage .hint {
    position: fixed; top: 18px; left: 22px;
    font-size: 11.5px; color: #6e6a5f; letter-spacing: 0.04em;
    display: flex; align-items: center; gap: 10px;
  }
  .stage .hint b { color: #2a2826; font-weight: 600; letter-spacing: 0; }
  .stage .hint .kbd {
    font-family: 'JetBrains Mono', monospace; font-size: 10px;
    padding: 2px 6px; border-radius: 4px;
    background: #fff; border: 1px solid #d8d4c8; color: #4a4639;
  }
  @media (max-width: 520px) {
    .stage { padding: 0; background: none; }
    .stage .hint { display: none; }
    .ios-wrap { transform: none !important; }
  }
</style>
</head>
<body>
  <div class="stage">
    <div class="hint">
      <span><b>SSC Wet Check</b> — campus grounds field tool · Mobile prototype</span>
      <span style="opacity: 0.6">Try the <span class="kbd">Tweaks</span> toggle in the toolbar →</span>
    </div>
    <div id="root" class="ios-wrap"></div>
  </div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script src="data.js"></script>
  <script type="text/babel" src="ios-frame.jsx"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="components.jsx"></script>
  <script type="text/babel" src="config.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>

  <script type="text/babel" data-presets="react">
    function Shell() {
      return (
        <IOSDevice width={402} height={874}>
          <App />
        </IOSDevice>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<Shell />);
  </script>
</body>
</html>
